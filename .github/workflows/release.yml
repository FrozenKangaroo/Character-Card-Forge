name: Build and Release Companion App

# This tells GitHub to run the build automatically every time you push a version tag
on:
  push:
    tags:
      - 'v*' # Triggers on v1.0.0, v1.0.1, etc.

jobs:
  release:
    runs-on: macos-latest # GitHub boots up a real Mac in the cloud for you!
    
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-size: 20

      - name: Install Project Dependencies
        run: npm ci

      - name: Build macOS DMG Container
        run: npm run dist -- --mac dmg
        # (This triggers electron-builder to output a perfect .dmg file)

      - name: Upload DMG to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
