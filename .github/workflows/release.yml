name: Build and Release Companion App

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # Linux core dependencies + ImageMagick asset handling + FUSE runtime engine
      - name: Install Linux System Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 libgl1 libxkbcommon-x11-0 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 \
            libxcb-xinerama0 libxcb-xinput0 libxcb-xfixes0 \
            binutils wget imagemagick libfuse2

      # Mac DMG packaging tool engine
      - name: Install Mac System Dependencies
        if: matrix.os == 'macos-latest'
        run: brew install create-dmg

      # All systems install Python requirements and bundling toolkit
      - name: Install Python Package Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # Windows needs an .ico for the executable/taskbar icon.
      # This is generated from the same icon.png used by the Linux AppImage build.
      - name: Prepare Windows Icon
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          pip install pillow
          New-Item -ItemType Directory -Force build | Out-Null
          @'
          from pathlib import Path
          from PIL import Image

          src = Path("icon.png")
          out = Path("build/character-card-forge.ico")
          if not src.exists():
              raise SystemExit("icon.png not found; cannot create Windows icon")

          img = Image.open(src).convert("RGBA")
          sizes = [(16, 16), (24, 24), (32, 32), (48, 48), (64, 64), (128, 128), (256, 256)]
          img.save(out, format="ICO", sizes=sizes)
          print(f"Wrote {out}")
          '@ | python -

      # macOS needs an .icns for the .app bundle icon.
      # This is generated from the same icon.png used by the Linux AppImage build.
      - name: Prepare macOS Icon
        if: matrix.os == 'macos-latest'
        run: |
          test -f icon.png || (echo "icon.png not found; cannot create macOS icon" && exit 1)
          mkdir -p build/character-card-forge.iconset
          sips -z 16 16     icon.png --out build/character-card-forge.iconset/icon_16x16.png
          sips -z 32 32     icon.png --out build/character-card-forge.iconset/icon_16x16@2x.png
          sips -z 32 32     icon.png --out build/character-card-forge.iconset/icon_32x32.png
          sips -z 64 64     icon.png --out build/character-card-forge.iconset/icon_32x32@2x.png
          sips -z 128 128   icon.png --out build/character-card-forge.iconset/icon_128x128.png
          sips -z 256 256   icon.png --out build/character-card-forge.iconset/icon_128x128@2x.png
          sips -z 256 256   icon.png --out build/character-card-forge.iconset/icon_256x256.png
          sips -z 512 512   icon.png --out build/character-card-forge.iconset/icon_256x256@2x.png
          sips -z 512 512   icon.png --out build/character-card-forge.iconset/icon_512x512.png
          sips -z 1024 1024 icon.png --out build/character-card-forge.iconset/icon_512x512@2x.png
          iconutil -c icns build/character-card-forge.iconset -o build/character-card-forge.icns

      # --- COMPILATION & PACKAGING PHASE ---

      - name: Build Standalone Executable (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          # Added VERSION mapping to match local fix behavior
          pyinstaller --hidden-import certifi --collect-data certifi --noconfirm --onedir --windowed --name="Character-Card-Forge" --icon "build/character-card-forge.ico" --add-data "frontend;./frontend" --add-data "data;./data" --add-data "VERSION;." app.py
          cd dist
          tar -a -c -f Character-Card-Forge-Windows.zip Character-Card-Forge

      - name: Build Standalone Executable (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          # Added VERSION mapping to ensure Mac builds fetch correctly from bundle roots
          pyinstaller --hidden-import certifi --collect-data certifi --noconfirm --onedir --windowed --name="Character-Card-Forge" --icon "build/character-card-forge.icns" --add-data "frontend:frontend" --add-data "data:data" --add-data "VERSION:." app.py
          mkdir -p dist/dmg
          create-dmg \
            --volname "Character Card Forge" \
            --volicon "build/character-card-forge.icns" \
            --window-size 500 300 \
            --icon-size 100 \
            --app-drop-link 350 115 \
            --icon "Character-Card-Forge.app" 125 115 \
            "dist/dmg/Character-Card-Forge.dmg" \
            "dist/Character-Card-Forge.app"

      - name: Build Standalone Executable (Linux AppImage)
        if: matrix.os == 'ubuntu-latest'
        run: |
          # 1. Compile including the local VERSION data tracking flag
          pyinstaller --hidden-import certifi --collect-data certifi --noconfirm --onedir --windowed --name="Character-Card-Forge" --add-data "frontend:frontend" --add-data "data:data" --add-data "VERSION:." app.py

          # 2. Grab the official deployment packager asset binary
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage

          # 3. Mirroring the local fix: explicitly clone the VERSION tracking file straight into AppDir root namespace
          cp VERSION dist/Character-Card-Forge/VERSION

          # Step inside the directory structure workspace to establish system integrations
          cd dist/Character-Card-Forge

          cat << 'EOT' > character-card-forge.desktop
          [Desktop Entry]
          Type=Application
          Name=Character Card Forge
          Exec=Character-Card-Forge
          Icon=character-card-forge
          Categories=Utility;
          EOT

          convert ../../icon.png -resize 256x256 character-card-forge.png
          ln -sf Character-Card-Forge AppRun

          # 4. Drop back down to project root execution path and pack the target container
          cd ../../
          ./appimagetool-x86_64.AppImage dist/Character-Card-Forge dist/Character-Card-Forge-Linux.AppImage

      # --- AUTOMATED ARTIFACT DISTRIBUTION PHASE ---

      - name: Upload Windows Asset
        if: matrix.os == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Character-Card-Forge-Windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS Asset
        if: matrix.os == 'macos-latest'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/dmg/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux Asset
        if: matrix.os == 'ubuntu-latest'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Character-Card-Forge-Linux.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
