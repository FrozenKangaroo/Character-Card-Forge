name: Build and Release Companion App

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # Linux dependencies + ImageMagick
      - name: Install Linux System Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 libgl1 libxkbcommon-x11-0 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 \
            libxcb-xinerama0 libxcb-xinput0 libxcb-xfixes0 \
            binutils wget imagemagick

      # Mac DMG creator utility
      - name: Install Mac System Dependencies
        if: matrix.os == 'macos-latest'
        run: brew install create-dmg

      # All platforms install dependencies
      - name: Install Python Package Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # --- COMPILATION PHASE ---

      - name: Build Standalone Executable (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          pyinstaller --noconfirm --onedir --windowed --name="Character-Card-Forge" --add-data "frontend;frontend" --add-data "data;data" app.py
          powershell Compress-Archive -Path "dist/Character-Card-Forge/*" -DestinationPath "dist/Character-Card-Forge-Windows.zip"

      - name: Build Standalone Executable (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          pyinstaller --noconfirm --onedir --windowed --name="Character-Card-Forge" --add-data "frontend:frontend" --add-data "data:data" app.py
          mkdir -p dist/dmg
          create-dmg \
            --volname "Character Card Forge" \
            --window-size 500 300 \
            --icon-size 100 \
            --app-drop-link 350 115 \
            --icon "Character-Card-Forge.app" 125 115 \
            "dist/dmg/Character-Card-Forge.dmg" \
            "dist/Character-Card-Forge.app"

      - name: Build Standalone Executable (Linux AppImage)
        if: matrix.os == 'ubuntu-latest'
        run: |
          # 1. Build the full folder layout via PyInstaller with assets included
          pyinstaller --noconfirm --onedir --windowed --name="Character-Card-Forge" --add-data "frontend:frontend" --add-data "data:data" app.py
          
          # 2. Get the official AppImage packaging tool
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          
          # 3. Move into the compiled bundle directory to set up the AppDir metadata
          cd dist/Character-Card-Forge
          
          cat << 'EOT' > character-card-forge.desktop
          [Desktop Entry]
          Type=Application
          Name=Character Card Forge
          Exec=Character-Card-Forge
          Icon=character-card-forge
          Categories=Utility;
          EOT
          
          # Handle the icon and create the entrypoint symlink
          convert ../../icon.png -resize 256x256 character-card-forge.png
          ln -sf Character-Card-Forge AppRun
          
          # 4. Step back out and package the ENTIRE folder bundle
          cd ../../
          ./appimagetool-x86_64.AppImage dist/Character-Card-Forge dist/Character-Card-Forge-Linux.AppImage

      # --- ARTIFACT UPLOAD PHASE ---

      - name: Upload Windows Asset
        if: matrix.os == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Character-Card-Forge-Windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS Asset
        if: matrix.os == 'macos-latest'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/dmg/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux Asset
        if: matrix.os == 'ubuntu-latest'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Character-Card-Forge-Linux.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
